<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 特效展示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <h2>🎮 控制面板</h2>
        <label>旋转速度: <input type="range" id="speed" min="0" max="100" value="50"></label>
        <label>粒子数量: <input type="range" id="particles" min="100" max="2000" value="500"></label>
        <button id="toggle">切换视角</button>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
